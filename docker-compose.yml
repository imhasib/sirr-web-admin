version: '3.8'

services:
  sirr-web-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "${SIRR_WEB_ADMIN_PORT:-3030}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    networks:
      - sirr-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service with hot reload
  sirr-web-admin-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${SIRR_WEB_ADMIN_PORT:-3030}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    profiles:
      - dev
    networks:
      - sirr-network

networks:
  sirr-network:
    name: sirr-deployment_sirr-network
    external: true
